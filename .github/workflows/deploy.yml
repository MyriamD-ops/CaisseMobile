name: Deploy CaisseMobile
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare temp folders on VPS
        run: |
          ssh -p 22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "rm -rf /home/user/deploy_tmp && mkdir -p /home/user/deploy_tmp/build && mkdir -p /home/user/deploy_tmp/images && mkdir -p /home/user/deploy_tmp/app && mkdir -p /home/user/deploy_tmp/routes && mkdir -p /home/user/deploy_tmp/config && mkdir -p /home/user/deploy_tmp/views"

      - name: Upload build assets
        run: |
          scp -r -P 22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            public/build/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/user/deploy_tmp/build/

      - name: Upload PHP files
        run: |
          scp -r -P 22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            app/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/user/deploy_tmp/app/

          scp -r -P 22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            routes/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/user/deploy_tmp/routes/

          scp -r -P 22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            config/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/user/deploy_tmp/config/

          scp -r -P 22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            resources/views/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/user/deploy_tmp/views/

      - name: Upload images
        run: |
          scp -r -P 22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            public/images/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/user/deploy_tmp/images/

      - name: Upload scripts
        run: |
          if [ -f fix_production.php ]; then
            scp -P 22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
              fix_production.php \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/user/deploy_tmp/
          fi

      - name: Deploy to app and clear cache
        run: |
          ssh -p 22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
          APP=/home/user/htdocs/srv1442975.hstgr.cloud
          TMP=/home/user/deploy_tmp

          # Remplace les assets sans supprimer (évite le 500 pendant le déploiement)
          cp -rf $TMP/build/.   $APP/public/build/
          # Copier le manifest au bon endroit (Laravel 11 cherche public/build/manifest.json)
          if [ -f "$APP/public/build/.vite/manifest.json" ]; then
            cp $APP/public/build/.vite/manifest.json $APP/public/build/manifest.json
          fi
          mkdir -p $APP/public/images
          cp -rf $TMP/images/.  $APP/public/images/
          cp -rf $TMP/app/.     $APP/app/
          cp -rf $TMP/routes/.  $APP/routes/
          cp -rf $TMP/config/.  $APP/config/
          cp -rf $TMP/views/.   $APP/resources/views/

          cd $APP && php artisan optimize

          # Purge OPcache PHP
          php -r "opcache_reset();" 2>/dev/null || true

          # Redémarre PHP-FPM pour forcer le rechargement
          sudo systemctl reload php8.4-fpm 2>/dev/null || \
          sudo systemctl reload php-fpm 2>/dev/null || \
          kill -USR2 $(cat /var/run/php/php8.4-fpm.pid 2>/dev/null) 2>/dev/null || true

          if [ -f "/home/user/deploy_tmp/fix_production.php" ]; then
            cp /home/user/deploy_tmp/fix_production.php $APP/fix_production.php
            php $APP/fix_production.php && rm -f $APP/fix_production.php
            echo "=== fix_production exécuté ==="
          fi

          rm -rf /home/user/deploy_tmp
          echo "=== Deploy OK ==="
          ENDSSH
