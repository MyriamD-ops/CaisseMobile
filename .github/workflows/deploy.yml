name: Deploy CaisseMobile
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare temp deploy folder on VPS
        run: |
          ssh -p 22 -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "rm -rf ~/deploy_tmp && mkdir -p ~/deploy_tmp/views"

      - name: Upload assets to temp folder
        run: |
          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            public/build \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/deploy_tmp/

      - name: Upload PHP files to temp folder
        run: |
          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            app/ routes/ config/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/deploy_tmp/

          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            resources/views/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/deploy_tmp/views/

      - name: Move files to app folder and clear cache
        run: |
          ssh -p 22 -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          APP=/home/$USER/htdocs/srv1442975.hstgr.cloud
          TMP=~/deploy_tmp

          cp -r $TMP/build       $APP/public/
          cp -r $TMP/app/*       $APP/app/
          cp -r $TMP/routes/*    $APP/routes/
          cp -r $TMP/config/*    $APP/config/
          cp -r $TMP/views/*     $APP/resources/views/

          cd $APP
          php artisan optimize

          rm -rf ~/deploy_tmp
          echo "Deploy OK"
          EOF
