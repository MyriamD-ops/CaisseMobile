name: Deploy CaisseMobile
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy assets (public/build)
        run: |
          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            public/build \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/htdocs/srv1442975.hstgr.cloud/public/

      - name: Deploy PHP files via SCP
        run: |
          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            app/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/htdocs/srv1442975.hstgr.cloud/

          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            routes/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/htdocs/srv1442975.hstgr.cloud/

          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            resources/views/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/htdocs/srv1442975.hstgr.cloud/resources/

          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            config/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/htdocs/srv1442975.hstgr.cloud/

      - name: Clear Laravel cache
        run: |
          ssh -p 22 -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ~/htdocs/srv1442975.hstgr.cloud && php artisan optimize"
