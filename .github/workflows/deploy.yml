name: Deploy CaisseMobile
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare temp folders on VPS
        run: |
          ssh -p 22 -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "rm -rf ~/deploy_tmp && mkdir -p ~/deploy_tmp/build ~/deploy_tmp/app ~/deploy_tmp/routes ~/deploy_tmp/config ~/deploy_tmp/views"

      - name: Upload build assets
        run: |
          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            public/build/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/deploy_tmp/build/

      - name: Upload PHP files
        run: |
          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            app/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/deploy_tmp/app/

          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            routes/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/deploy_tmp/routes/

          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            config/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/deploy_tmp/config/

          scp -r -P 22 -i ~/.ssh/id_ed25519 \
            resources/views/. \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/deploy_tmp/views/

      - name: Upload update_user script
        run: |
          scp -P 22 -i ~/.ssh/id_ed25519 \
            update_user.php \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/deploy_tmp/

      - name: Deploy to app and clear cache
        run: |
          ssh -p 22 -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          APP=/home/$USER/htdocs/srv1442975.hstgr.cloud
          TMP=~/deploy_tmp

          cp -rf $TMP/build/.   $APP/public/build/
          cp -rf $TMP/app/.     $APP/app/
          cp -rf $TMP/routes/.  $APP/routes/
          cp -rf $TMP/config/.  $APP/config/
          cp -rf $TMP/views/.   $APP/resources/views/

          cd $APP && php artisan optimize

          # Mise à jour utilisateur si script présent
          if [ -f "$TMP/update_user.php" ]; then
            php $APP/update_user.php && rm -f $APP/update_user.php
            echo "Script update_user exécuté et supprimé"
          fi

          rm -rf ~/deploy_tmp
          echo "=== Deploy OK ==="
          EOF
